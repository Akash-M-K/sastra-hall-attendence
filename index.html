<!DOCTYPE html>
<html>
<head>
<title>University Leave Permission</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN PAGE -->
 <div>
    <img src="images.jpg" class="img">
 </div>
<div class="container" id="loginPage">
<h2>Login</h2>

<select id="role">
<option value="staff">Staff</option>
<option value="admin">Administrator</option>
</select><br><br>

<input type="text" id="staffID" placeholder="Staff ID"><br><br>
<input type="text" id="staffName" placeholder="Staff Name"><br><br>
<input type="date" id="leaveDate"><br><br>

<button onclick="login()">Login</button>
</div>

<!-- STAFF PAGE -->
<div class="container hidden" id="staffPage">
<h2>Welcome <span id="nameDisplay"></span></h2>

<h3>Weekly Timetable</h3>
<table>
<h3>Weekly Timetable</h3>
<table id="timetable">
</table>

<br>

<h3>Apply Leave</h3>

<select id="leaveType">
<option value="hour">1 Hour Leave</option>
<option value="day">Full Day Leave</option>
</select><br><br>

<select id="hourSelect">
<option value="">Select Hour</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
</select><br><br>

<button onclick="applyLeave()">Submit Leave</button>

<p id="msg"></p>

<button onclick="logout()">Logout</button>
</div>

<!-- ADMIN PAGE -->
<div class="container hidden" id="adminPage">
<h2>Administrator Panel</h2>

<table id="leaveTable">
<tr>
<th>Staff ID</th>
<th>Name</th>
<th>Date</th>
<th>Leave Type</th>
<th>Hour</th>
</tr>
</table>

<br>
<button onclick="download()">Download Records</button>
<br><br>
<button onclick="logout()">Logout</button>
</div>

<script src="script.js"></script>
</body>
</html>
